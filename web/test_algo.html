<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>beyond-qr Image decode test (JS algo + WASM RS)</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    .ok { color: #2a9d2a; }
    .ng { color: #c0392b; }
    canvas { border: 1px solid #ccc; max-width: 256px; }
  </style>
</head>
<body>
  <h1>beyond-qr Image decode test</h1>
  <div id="log"></div>
  <canvas id="cv"></canvas>

  <script type="module">
    import init, { decode } from "./pkg/beyond_qr_core_wasm.js";
    import { decodeImageToCells, PHASE_0_SPEC } from "./algo.js";

    const log = document.getElementById("log");
    const out = (msg, cls = "") => {
      const div = document.createElement("div");
      div.className = cls;
      div.textContent = msg;
      log.appendChild(div);
    };

    async function loadImageRGB(url) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = url;
      });
      const canvas = document.getElementById("cv");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, img.naturalWidth, img.naturalHeight).data;
      // data is RGBA. extract RGB.
      const rgb = new Uint8Array(img.naturalWidth * img.naturalHeight * 3);
      for (let i = 0, j = 0; i < data.length; i += 4, j += 3) {
        rgb[j] = data[i];
        rgb[j + 1] = data[i + 1];
        rgb[j + 2] = data[i + 2];
      }
      return { rgb, w: img.naturalWidth, h: img.naturalHeight };
    }

    async function main() {
      await init();
      out("[init] WASM loaded");

      const { rgb, w, h } = await loadImageRGB("./samples/frame.png");
      out(`[load] frame.png ${w}x${h}`);

      const spec = PHASE_0_SPEC;
      const t0 = performance.now();
      const cells = decodeImageToCells(rgb, w, h, spec);
      const t1 = performance.now();
      out(`[algo] decoded to ${cells.length} cells in ${(t1 - t0).toFixed(0)}ms`);

      const payload = decode(
        cells,
        spec.gridWidth, spec.gridHeight, spec.cellPx,
        spec.finderSize, spec.calibrationRowStart, spec.calibrationRows
      );
      out(`[decode] payload ${payload.length}B`);

      // expected: load samples/input.bin
      const expectedRes = await fetch("./samples/input.bin");
      const expectedBuf = new Uint8Array(await expectedRes.arrayBuffer());
      out(`[expected] input.bin ${expectedBuf.length}B`);

      const equal = payload.length === expectedBuf.length
        && payload.every((v, i) => v === expectedBuf[i]);
      out(`[verify] ${equal ? "OK (byte exact)" : "FAIL"}`, equal ? "ok" : "ng");
      if (!equal) {
        let diff = 0;
        const n = Math.min(payload.length, expectedBuf.length);
        for (let i = 0; i < n; i++) if (payload[i] !== expectedBuf[i]) diff++;
        out(`  diff ${diff}/${n}`);
      }
    }

    main().catch(e => {
      out(`[error] ${e}`, "ng");
      console.error(e);
    });
  </script>
</body>
</html>
