<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Phase 1 integrated test</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin: 1em; }
    .ok { color: #6c6; }
    .ng { color: #f66; }
    canvas { background: #fff; image-rendering: pixelated; }
  </style>
</head>
<body>
  <h1>Phase 1 integrated test (encode → QR → jsQR → decode)</h1>
  <div id="log"></div>
  <canvas id="qrCv" width="800" height="800"></canvas>

  <script type="module">
    import init, { FountainEncoder, FountainDecoder } from "./pkg/beyond_qr_core_wasm.js";

    const log = document.getElementById("log");
    const out = (m, cls = "") => { const d = document.createElement("div"); d.className = cls; d.textContent = m; log.appendChild(d); };

    function bytesToBinaryString(bytes) {
      let s = "";
      for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
      return s;
    }

    function drawQR(qr, canvas, sizePx) {
      const ctx = canvas.getContext("2d");
      const modules = qr.getModuleCount();
      const cellSize = Math.floor(sizePx / (modules + 2));
      const offset = Math.floor((sizePx - cellSize * modules) / 2);
      canvas.width = sizePx;
      canvas.height = sizePx;
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, sizePx, sizePx);
      ctx.fillStyle = "#000";
      for (let r = 0; r < modules; r++) {
        for (let c = 0; c < modules; c++) {
          if (qr.isDark(r, c)) ctx.fillRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize);
        }
      }
      return { offset, cellSize, modules };
    }

    function readQR(canvas) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width, h = canvas.height;
      const data = ctx.getImageData(0, 0, w, h);
      return jsQR(data.data, w, h);
    }

    async function main() {
      await init();
      out("[init] WASM loaded");

      // 1KB payload
      const payload = new Uint8Array(1000);
      for (let i = 0; i < payload.length; i++) payload[i] = (i * 31 + 7) & 0xff;
      out(`[payload] ${payload.length}B`);

      const packetSize = 500;
      const encoder = new FountainEncoder(payload, packetSize, 5);
      const oti = encoder.otiBytes();
      out(`[encoder] OTI=${Array.from(oti).map(b=>b.toString(16).padStart(2,"0")).join("")}, packets=${encoder.packetCount()}`);

      const decoder = new FountainDecoder(oti);
      out(`[decoder] payload size=${decoder.payloadSize()}B`);

      const cv = document.getElementById("qrCv");
      let recovered = null;
      let qrSuccess = 0;
      for (let i = 0; i < encoder.packetCount(); i++) {
        const packet = encoder.packet(i);
        const qrData = new Uint8Array(12 + packet.length);
        qrData.set(oti, 0);
        qrData.set(packet, 12);
        const qr = qrcode(25, "H");
        qr.addData(bytesToBinaryString(qrData), "Byte");
        try {
          qr.make();
        } catch (e) {
          out(`[error] QR build failed for packet ${i}: ${e.message}`, "ng");
          break;
        }
        drawQR(qr, cv, 800);
        const code = readQR(cv);
        if (!code || !code.binaryData) {
          out(`[qr] packet ${i}: jsQR failed to read`, "ng");
          continue;
        }
        qrSuccess++;
        const read = new Uint8Array(code.binaryData);
        const readPacket = read.slice(12);
        const done = decoder.addPacket(readPacket);
        if (done) {
          recovered = decoder.payload();
          out(`[done] recovered after ${i + 1} packets, ${qrSuccess} QR reads`, "ok");
          break;
        }
      }

      if (!recovered) {
        out(`[FAIL] not recovered`, "ng");
        return;
      }

      let equal = recovered.length === payload.length;
      if (equal) {
        for (let i = 0; i < payload.length; i++) {
          if (recovered[i] !== payload[i]) { equal = false; break; }
        }
      }
      out(`[verify] recovered=${recovered.length}B, byte-exact=${equal}`, equal ? "ok" : "ng");
    }
    main().catch(e => out(`[err] ${e.message || e}`, "ng"));
  </script>
</body>
</html>
