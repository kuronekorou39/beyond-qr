<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>beyond-qr Receiver (Phase 1)</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; padding: 0;
      background: #111; color: #eee;
      font-family: -apple-system, "Segoe UI", sans-serif;
      display: flex; flex-direction: column;
      min-height: 100dvh;
    }
    header { padding: 0.5em 1em; background: #1a1a1a; border-bottom: 1px solid #333; }
    header h1 { margin: 0; font-size: 1.1em; }
    main { flex: 1; display: flex; flex-direction: column; padding: 1em; gap: 0.8em; }
    .stage {
      position: relative;
      width: 100%; max-width: 200px; aspect-ratio: 1/1;
      align-self: center;
      background: #000; border: 1px solid #444; overflow: hidden;
    }
    video, canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
    .controls { display: flex; gap: 0.5em; justify-content: center; flex-wrap: wrap; align-items: center; }
    button {
      background: #fc4; color: #111; border: none; padding: 0.6em 1.2em;
      font-size: 1em; font-weight: bold; border-radius: 4px;
      cursor: pointer; min-width: 120px;
    }
    button:disabled { background: #555; color: #888; }
    button.secondary { background: #444; color: #eee; }
    .controls label { font-size: 0.85em; color: #bbb; }
    .controls input { width: 3em; }
    .panel {
      max-width: 480px; align-self: center; width: 100%;
      background: #1a1a1a; padding: 0.6em 0.8em; border-radius: 4px;
      font-family: monospace; font-size: 0.9em;
    }
    #timing { white-space: pre-wrap; line-height: 1.4; }
    #timing .hi { color: #6c6; }
    .progress-bar {
      height: 6px; background: #333; border-radius: 3px; margin-top: 4px;
      overflow: hidden;
    }
    .progress-bar > div { height: 100%; background: #fc4; transition: width 0.2s; }
    .log {
      max-width: 480px; align-self: center; width: 100%;
      background: #181818; padding: 0.5em; border-radius: 4px;
      font-family: monospace; font-size: 0.8em;
      max-height: 140px; overflow-y: auto;
    }
    .log .ok { color: #6c6; }
    .log .ng { color: #f66; }
    .log .info { color: #aaa; }
    .result {
      max-width: 480px; align-self: center; width: 100%;
      background: #1c2810; border: 1px solid #2c5; border-radius: 4px;
      padding: 0.8em; display: none;
    }
    .result pre {
      margin: 0.3em 0; max-height: 200px; overflow: auto;
      font-size: 0.75em; background: #0a0a0a; padding: 0.5em; border-radius: 4px;
    }
    a.dl-link {
      display: inline-block; padding: 0.4em 0.8em;
      background: #2c5; color: #111; text-decoration: none;
      border-radius: 4px; font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>beyond-qr Receiver (Phase 1: QR + Fountain)</h1>
  </header>
  <main>
    <div class="controls">
      <button id="startBtn">カメラ開始</button>
      <button id="stopBtn" class="secondary" disabled>停止</button>
      <button id="sendLogBtn" class="secondary" disabled>ログ送信</button>
      <label><input type="checkbox" id="followSender" checked> 送信側に追従</label>
      <label title="複数プロファイルを連続計測。復元しても止まらず runId 変化で次パターンを測る"><input type="checkbox" id="sweepRecv"> スイープ受信</label>
      <label title="多グリッドの1タイル目標px。大きいほど読めるが jsQR が重く scanFps が下がる (1x1 は無関係)">タイルpx:
        <select id="tilePx">
          <option value="400">400</option>
          <option value="460" selected>460</option>
          <option value="520">520</option>
          <option value="560">560</option>
          <option value="620">620</option>
          <option value="700">700</option>
        </select></label>
      <label>グリッド(手動時): <select id="grid">
        <option value="1x1">1×1</option>
        <option value="1x2" selected>1×2</option>
        <option value="2x2">2×2</option>
        <option value="2x3">2×3</option>
        <option value="3x3">3×3</option>
      </select></label>
    </div>
    <div class="panel" id="senderInfo">送信側: 未検出</div>
    <div class="panel" id="sweepPanelRecv" style="display:none"></div>
    <div class="panel" id="timing">待機中</div>
    <div class="stage">
      <video id="preview" autoplay playsinline muted></video>
      <canvas id="captureCanvas" style="display:none"></canvas>
    </div>
    <div class="panel" id="progress">
      <div>待機中</div>
      <div class="progress-bar"><div id="progressBar" style="width: 0%"></div></div>
    </div>
    <div class="log" id="log"></div>
    <div class="result" id="result">
      <strong>復元成功!</strong>
      <pre id="resultPreview"></pre>
      <a id="downloadLink" class="dl-link">ダウンロード</a>
    </div>
  </main>

  <script type="module">
    import init, { FountainDecoder } from "./pkg/beyond_qr_core_wasm.js";
    import { detectQRCodesGrid } from "./qr_util.js";

    const $ = (id) => document.getElementById(id);
    const log = $("log");
    const video = $("preview");
    const captureCanvas = $("captureCanvas");
    const progressEl = $("progress");
    const progressBar = $("progressBar");
    const timingEl = $("timing");
    const result = $("result");

    const out = (msg, cls = "info") => {
      const div = document.createElement("div");
      div.className = cls;
      div.textContent = msg;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    };

    let stream = null;
    let decoder = null;
    let scanLoop = null;
    let uniquePackets = new Set();   // ESI 等で重複検知
    let totalAttempts = 0;           // 走査したフレーム数
    let successfulDecodes = 0;       // 読めた QR の総数 (重複込み)
    let payload = null;
    let lastOtiHex = null;
    // タイミング (比較用)。performance.now() = 経過計測、Date = 時刻表示。
    let cameraStartTs = null, cameraStartClock = null;
    let firstPacketTs = null, firstPacketClock = null;
    let doneTs = null, doneClock = null;
    // バックチャネル / 送信側追従用
    let statePollTimer = null, statePostTimer = null;
    let senderGrid = null, senderFps = null;   // 送信側の現在設定 (/state より)
    let effectiveGrid = "1x1";                 // 実際にタイル分割に使うグリッド
    let winFrames = 0, winReads = 0;           // 直近ウィンドウの reads/frame 集計
    let settlingUntil = 0;                     // 再同期直後の過渡期 (送信側に効率評価させない)
    let senderTotalPackets = 0, senderPacketSize = 0; // 進捗見積り用 (/state より)
    let senderProbing = false;                 // 送信側がプローブ中 (復号せず読取率だけ測る)
    let lastWinResetTs = 0;                    // scanFps 計測用 (ウィンドウ開始時刻)
    let lastProbeGrid = null;                  // プローブ中のグリッド変化検出用
    let wakeLock = null;                       // 画面減光で rAF が間引かれるのを防ぐ
    let lastFrameTs = 0;                        // 最後に scanFrame が回った時刻 (watchdog 用)
    let decodeMsAvg = 0;                        // 1フレームのデコード所要 ms の移動平均 (発熱スロットリング検知)
    let watchdogTimer = null;                   // スキャンループ停止を検出して自動再起動する監視タイマー
    // 実データスイープ用 (送信側の runId で1パターンの境界を作る)
    let senderSweep = false;
    let currentRunId = null;                   // 現在計測中の runId
    let recoveredRunId = null;                 // 直近で復元完了した runId
    let recoverSec = null;                     // そのパターンの転送秒 (最初のQR→復元)
    let sweepResults = [];                     // 受信側スイープ結果 [{runId,label,ok,recoverSec,unique}]
    let currentRunLabel = "";                  // 現在計測中パターンのラベル (送信側 patternLabel)

    function resetState() {
      decoder = null;
      uniquePackets = new Set();
      totalAttempts = 0;
      successfulDecodes = 0;
      payload = null;
      lastOtiHex = null;
      cameraStartTs = cameraStartClock = null;
      firstPacketTs = firstPacketClock = null;
      doneTs = doneClock = null;
      result.style.display = "none";
      progressBar.style.width = "0%";
      senderGrid = senderFps = null;
      senderTotalPackets = senderPacketSize = 0;
      senderProbing = false;
      winFrames = 0; winReads = 0;
      settlingUntil = 0;
      lastWinResetTs = 0;
      lastProbeGrid = null;
    }

    async function requestWakeLock() {
      try { if ("wakeLock" in navigator) wakeLock = await navigator.wakeLock.request("screen"); } catch (e) { /* 非対応/失敗は無視 */ }
    }
    function releaseWakeLock() {
      try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) { /* noop */ }
    }

    // スイープ受信モードが有効か。ローカルの「スイープ受信」トグルを優先し、無ければ送信側の
    // sweep フラグ (バックチャネル推測) にフォールバック。この間は復元しても止めず runId で
    // パターンを区切って連続計測する。トグルを明示 ON にすれば推測の race に依存しない。
    function sweepActive() {
      return $("sweepRecv").checked || senderSweep;
    }

    // プローブのダミー残骸を拾わないよう、復号状態を一度クリアして次の本番 OTI を待つ。
    function clearForNewSession() {
      decoder = null;
      uniquePackets = new Set();
      payload = null;
      firstPacketTs = firstPacketClock = null;
      doneTs = doneClock = null;
      lastOtiHex = null;
      result.style.display = "none";
      progressBar.style.width = "0%";
      winFrames = 0; winReads = 0;
      lastWinResetTs = performance.now();
      lastProbeGrid = null;
      out("[probe終了] 本番送信待ち", "info");
    }

    // 送信側が設定 (OTI) を変えたとき、カメラは止めずに復号だけやり直す。
    function resyncDecode(newOtiHex) {
      decoder = null;
      uniquePackets = new Set();
      payload = null;
      firstPacketTs = firstPacketClock = null;
      doneTs = doneClock = null;
      result.style.display = "none";
      progressBar.style.width = "0%";
      winFrames = 0; winReads = 0;               // reads 窓を新セッションから測り直す
      lastWinResetTs = performance.now();
      settlingUntil = performance.now() + 1500;  // 過渡期は送信側に効率を評価させない
      out(`[resync] 送信側の設定変更を検出 (OTI=${newOtiHex})。復号をやり直します`, "info");
    }

    // スイープ: runId が変わるたびに復号状態をリセットして次パターンを計測する。
    // FPS だけ変えた場合 OTI が同一になり resyncDecode が発火しないため、runId で明示的に区切る。
    function startNewRun(runId, label) {
      // 前パターンが未復元のまま次へ移る → NG として受信側の結果に記録
      if (currentRunId != null && recoveredRunId !== currentRunId) recordSweepResult(false);
      currentRunLabel = label || `#${runId}`;
      currentRunId = runId;
      decoder = null;
      uniquePackets = new Set();
      payload = null;
      lastOtiHex = null;
      firstPacketTs = firstPacketClock = null;
      doneTs = doneClock = null;
      result.style.display = "none";
      progressBar.style.width = "0%";
      winFrames = 0; winReads = 0;
      lastWinResetTs = performance.now();
      settlingUntil = performance.now() + 1200;
      recoverSec = null;
      out(`[sweep] パターン#${runId}${label ? " " + label : ""} 計測開始`, "info");
    }

    async function startCamera() {
      try {
        resetState();              // 複数回計測できるよう毎回リセット
        await init();
        out("[init] WASM loaded");
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });
        video.srcObject = stream;
        await video.play();
        cameraStartTs = performance.now();
        cameraStartClock = new Date();
        lastWinResetTs = performance.now();
        requestWakeLock();
        out(`[camera] ${video.videoWidth}x${video.videoHeight} 起動`);
        $("startBtn").disabled = true;
        $("stopBtn").disabled = false;
        $("sendLogBtn").disabled = false;
        lastFrameTs = performance.now();
        statePollTimer = setInterval(pollState, 900);
        statePostTimer = setInterval(postReceiverState, 900);
        watchdogTimer = setInterval(scanWatchdog, 2000);   // ループ停止の自動復帰 (長時間スイープ対策)
        // 走査開始前に送信側状態を確定させる。1パケットで即復元する小ペイロードだと、
        // pollState 完了前の最初のフレームで復元→senderSweep=false のまま stop() してしまう race を防ぐ。
        await pollState();
        scanLoop = requestAnimationFrame(scanFrame);
      } catch (e) {
        out(`[error] camera: ${e.message}`, "ng");
      }
    }

    // 画面ロック/バックグラウンドで rAF が凍結すると scanFrame が止まり scanFps=0 のまま黙って全滅する。
    // stream があるのに一定時間ループが回っていなければ、前面復帰時に自動でループを張り直し wakeLock も取り直す。
    function scanWatchdog() {
      if (!stream) return;
      if (performance.now() - lastFrameTs > 2500) {
        if (!wakeLock) requestWakeLock();
        if (scanLoop) cancelAnimationFrame(scanLoop);
        lastFrameTs = performance.now();               // 多重再起動を防ぐため先に更新
        scanLoop = requestAnimationFrame(scanFrame);
        out("[watchdog] スキャン停止を検出 → ループ再起動", "info");
      }
    }

    function stop() {
      if (scanLoop) cancelAnimationFrame(scanLoop);
      scanLoop = null;
      if (statePollTimer) { clearInterval(statePollTimer); statePollTimer = null; }
      if (statePostTimer) { clearInterval(statePostTimer); statePostTimer = null; }
      if (watchdogTimer) { clearInterval(watchdogTimer); watchdogTimer = null; }
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      releaseWakeLock();
      $("startBtn").disabled = false;
      $("stopBtn").disabled = true;
      postReceiverState(); // 最終状態 (recovered/stopped) を送信側へ
    }

    function updateProgress() {
      const text = decoder
        ? `OTI: ${lastOtiHex} | payload ${decoder.payloadSize()}B | unique: ${uniquePackets.size} (QR読取 ${successfulDecodes}, frame ${totalAttempts})`
        : `frames scanned: ${totalAttempts} | QRs detected: ${successfulDecodes}`;
      progressEl.firstElementChild.textContent = text;
      if (decoder) {
        const payloadBytes = Number(decoder.payloadSize());
        // 送信側のパケットサイズが分かれば正確に (グリッド連動で 500B 固定ではない)、無ければ 500B 仮定
        const estimatedSourcePackets = Math.max(1, Math.ceil(payloadBytes / (senderPacketSize || 500)));
        const pct = Math.min(100, (uniquePackets.size / estimatedSourcePackets) * 100);
        progressBar.style.width = `${pct}%`;
      }
    }

    const fmtClock = (d) => d ? d.toLocaleTimeString("ja-JP", { hour12: false }) : "—";

    function updateTiming() {
      if (cameraStartTs === null) { timingEl.textContent = "待機中"; return; }
      const nowOrDone = doneTs !== null ? doneTs : performance.now();
      const sinceCam = (nowOrDone - cameraStartTs) / 1000;
      let txt = `カメラ開始: ${fmtClock(cameraStartClock)}   (経過 ${sinceCam.toFixed(1)}s)\n`;
      if (firstPacketTs !== null) {
        const sinceFirst = (nowOrDone - firstPacketTs) / 1000;
        txt += `最初のQR : ${fmtClock(firstPacketClock)}   (転送 ${sinceFirst.toFixed(1)}s)\n`;
      } else {
        txt += `最初のQR : —\n`;
      }
      if (doneTs !== null) {
        const transfer = (doneTs - firstPacketTs) / 1000;
        const total = (doneTs - cameraStartTs) / 1000;
        const kbps = payload ? (payload.length / 1024) / Math.max(transfer, 0.001) : 0;
        txt += `復元完了 : ${fmtClock(doneClock)}\n`;
        txt += `▶ 転送 ${transfer.toFixed(2)}s / 総 ${total.toFixed(2)}s / ${kbps.toFixed(1)} KB/s`;
      } else if (decodeMsAvg > 0) {
        // 計測中はデコード負荷を出す (発熱で ms が増える=throttling の目安)
        txt += `デコード ${decodeMsAvg.toFixed(0)}ms/frame`;
      }
      timingEl.textContent = txt;
    }

    function packetKey(bytes) {
      // 最初の 4 byte (ESI/SBN) を識別子に
      return `${bytes[0]}_${bytes[1]}_${bytes[2]}_${bytes[3]}`;
    }

    /**
     * sender.html が付けたメタデータヘッダを剥がして、本体ペイロードを返す。
     * 形式: [4 byte BE: header JSON length] [header JSON UTF-8] [body]
     * 互換性のため、ヘッダ JSON のパースに失敗したら全体を生 payload として扱う。
     */
    function unwrapPayload(payloadBytes) {
      if (payloadBytes.length < 4) return { name: "received_payload.bin", type: "application/octet-stream", body: payloadBytes };
      const view = new DataView(payloadBytes.buffer, payloadBytes.byteOffset, payloadBytes.byteLength);
      const headerLen = view.getUint32(0, false);
      if (headerLen <= 0 || headerLen > 4096 || 4 + headerLen > payloadBytes.length) {
        return { name: "received_payload.bin", type: "application/octet-stream", body: payloadBytes };
      }
      try {
        const headerStr = new TextDecoder().decode(payloadBytes.slice(4, 4 + headerLen));
        const meta = JSON.parse(headerStr);
        const body = payloadBytes.slice(4 + headerLen);
        return {
          name: meta.name || "received_payload.bin",
          type: meta.type || "application/octet-stream",
          body,
        };
      } catch (e) {
        return { name: "received_payload.bin", type: "application/octet-stream", body: payloadBytes };
      }
    }

    function showResult(payloadBytes) {
      const { name, type, body } = unwrapPayload(payloadBytes);

      const previewEl = $("resultPreview");
      previewEl.textContent = "";
      const isImage = type.startsWith("image/");
      const isText = type.startsWith("text/") || type === "application/json";

      if (isImage) {
        const url = URL.createObjectURL(new Blob([body], { type }));
        const img = document.createElement("img");
        img.src = url;
        img.style.maxWidth = "100%";
        img.style.maxHeight = "300px";
        previewEl.appendChild(img);
        previewEl.appendChild(document.createElement("br"));
        previewEl.appendChild(document.createTextNode(`${name} (${body.length}B, ${type})`));
      } else if (isText) {
        let txt = new TextDecoder().decode(body.slice(0, 1024));
        if (body.length > 1024) txt += `\n... (+${body.length - 1024}B)`;
        previewEl.textContent = `${name} (${body.length}B):\n\n${txt}`;
      } else {
        let hex = `${name} (${body.length}B, ${type}):\n`;
        const limit = Math.min(256, body.length);
        for (let i = 0; i < limit; i += 16) {
          const row = Array.from(body.slice(i, i + 16))
            .map(b => b.toString(16).padStart(2, "0")).join(" ");
          hex += row + "\n";
        }
        if (body.length > limit) hex += `... (+${body.length - limit}B)`;
        previewEl.textContent = hex;
      }

      const url = URL.createObjectURL(new Blob([body], { type }));
      const link = $("downloadLink");
      link.href = url;
      link.download = name;
      link.textContent = `${name} をダウンロード (${body.length}B)`;
      result.style.display = "block";
    }

    function scanFrame() {
      if (!stream) return;
      totalAttempts++;
      const vw = video.videoWidth, vh = video.videoHeight;
      if (vw === 0 || vh === 0) { scanLoop = requestAnimationFrame(scanFrame); return; }
      lastFrameTs = performance.now();   // watchdog へ「ループは生きている」と示す (全分岐の前で更新)

      const cropSize = Math.min(vw, vh);
      const cropX = Math.floor((vw - cropSize) / 2);
      const cropY = Math.floor((vh - cropSize) / 2);
      // 追従 ON かつ送信側を検出していればそのグリッド、無ければ手動選択
      const gridStr = ((senderProbing || sweepActive() || $("followSender").checked) && senderGrid) ? senderGrid : $("grid").value;
      effectiveGrid = gridStr;
      const [rows, cols] = gridStr.split("x").map(Number);
      // grid ごとに必要十分な解像度に。1x1 は単一の高版QR(v18)なので crop 実寸(~1080)を使う。
      // 多グリッドはタイルが低版なので 1080² は過剰で、jsQR を N 回走らせる分だけ scanFps を落とす。
      // タイル ~460px を狙って総解像度を下げ、デコード速度(scanFps)を優先する。
      const single = Math.max(rows, cols) === 1;
      const tilePx = parseInt($("tilePx").value) || 460;   // 多グリッドの1タイル目標px (可変ツマミ)
      const targetSize = single
        ? Math.min(1280, Math.max(640, cropSize))
        : Math.min(1440, Math.max(720, tilePx * Math.max(rows, cols)));
      captureCanvas.width = targetSize;
      captureCanvas.height = targetSize;
      const ctx = captureCanvas.getContext("2d", { willReadFrequently: true });
      ctx.drawImage(video, cropX, cropY, cropSize, cropSize, 0, 0, targetSize, targetSize);
      const imgData = ctx.getImageData(0, 0, targetSize, targetSize);

      const decodeT0 = performance.now();
      const codes = detectQRCodesGrid(imgData, rows, cols);  // グリッドにタイル分割して各タイルを読む
      const decodeMs = performance.now() - decodeT0;         // 発熱スロットリング検知用 (増えたら CPU が絞られている)
      decodeMsAvg = decodeMsAvg ? decodeMsAvg * 0.9 + decodeMs * 0.1 : decodeMs;
      winFrames++;
      successfulDecodes += codes.length;
      winFrames++;
      successfulDecodes += codes.length;

      if (senderProbing) {
        // プローブ中: 復号せず読取率だけ測る (途中で止めない)
        const [er, ec] = effectiveGrid.split("x").map(Number);
        const reads = Math.min(codes.length, er * ec);   // セル数でクランプ (効率>100%を防止)
        if (effectiveGrid !== lastProbeGrid) {            // グリッド切替時はウィンドウを測り直す (前設定の混入防止)
          lastProbeGrid = effectiveGrid;
          winFrames = 1; winReads = reads;
          lastWinResetTs = performance.now();
        } else {
          winReads += reads;
        }
        progressEl.firstElementChild.textContent = `📡 プローブ測定中: grid ${effectiveGrid} | ${codes.length} QR/frame`;
        updateTiming();
        scanLoop = requestAnimationFrame(scanFrame);
        return;
      }

      if (sweepActive() && payload && recoveredRunId === currentRunId) {
        // スイープ: 当該パターンは復元済み。デコードせず次パターン (runId 変化) を待つ
        progressEl.firstElementChild.textContent = `✅ #${currentRunId} 復元済 (${recoverSec}s) — 次パターン待ち`;
        updateTiming();
        scanLoop = requestAnimationFrame(scanFrame);
        return;
      }

      // フレーム内の OTI ごとに分類 (グリッド変更の過渡期は新旧 OTI の QR が混在しうる)
      const hex12 = (b) => Array.from(b.slice(0, 12)).map(x => x.toString(16).padStart(2, "0")).join("");
      const parsed = [];
      const otiCount = new Map();
      for (const bytes of codes) {
        if (bytes.length < 16) continue;
        const otiHex = hex12(bytes);
        parsed.push({ otiHex, oti: bytes.slice(0, 12), packet: bytes.slice(12) });
        otiCount.set(otiHex, (otiCount.get(otiHex) || 0) + 1);
      }
      if (parsed.length) {
        // このフレームで採用する OTI = 最多数派 (混在時に毎フレーム resync するバタつきを防ぐ)
        let targetOti = lastOtiHex, best = -1;
        for (const [o, n] of otiCount) if (n > best) { best = n; targetOti = o; }
        if (decoder && targetOti !== lastOtiHex) resyncDecode(targetOti); // 送信側が設定変更 → やり直し
        if (!decoder) {
          const seed = parsed.find(p => p.otiHex === targetOti);
          try {
            decoder = new FountainDecoder(seed.oti);
            lastOtiHex = targetOti;
            out(`[init decoder] OTI=${targetOti}, payload size=${decoder.payloadSize()}B`, "ok");
          } catch (e) {
            out(`[error] decoder init failed: ${e.message || e}`, "ng");
          }
        }
        // 採用 OTI のパケットだけを投入 (効率の母数 winReads も採用 OTI に揃える)
        if (decoder) {
          let targetReads = 0;
          for (const p of parsed) {
            if (p.otiHex !== lastOtiHex) continue;
            targetReads++;
            const key = packetKey(p.packet);
            if (uniquePackets.has(key)) continue;
            uniquePackets.add(key);
            if (firstPacketTs === null) { firstPacketTs = performance.now(); firstPacketClock = new Date(); }
            try {
              const done = decoder.addPacket(p.packet);
              if (done) {
                payload = decoder.payload();
                doneTs = performance.now();
                doneClock = new Date();
                out(`[recovered] ${payload.length}B in ${successfulDecodes} QR reads (${totalAttempts} frames)`, "ok");
                showResult(payload);
                updateProgress();
                updateTiming();
                if (sweepActive()) {
                  // スイープ: 止めずに記録し、次パターン (runId 変化) を待つ
                  recoveredRunId = currentRunId;
                  recoverSec = firstPacketTs ? +((doneTs - firstPacketTs) / 1000).toFixed(2) : null;
                  recordSweepResult(true);   // 受信側の結果パネルに反映
                  out(`[sweep] #${currentRunId} 復元 ${recoverSec}s — 止めずに次パターン待ち`, "ok");
                  postReceiverState();   // 即報告して送信側を次パターンへ進ませる
                  scanLoop = requestAnimationFrame(scanFrame);
                  return;
                }
                stop();
                return;
              }
            } catch (e) {
              out(`[error] addPacket: ${e.message || e}`, "ng");
            }
          }
          winReads += targetReads;
        }
      }

      updateProgress();
      updateTiming();
      scanLoop = requestAnimationFrame(scanFrame);
    }

    // ---- バックチャネル (serve_https.py の /state 経由) ----
    async function pollState() {
      try {
        const r = await fetch("/state", { cache: "no-store" });
        if (!r.ok) return;
        const st = await r.json();
        const s = st.sender || {};
        const wasProbing = senderProbing;
        const wasSenderSweep = senderSweep;
        const active = s._ts && (st.now - s._ts) < 4 && (s.running !== false || s.probing);
        if (active && s.grid) {
          senderGrid = s.grid; senderFps = s.fps;
          senderTotalPackets = s.totalPackets || 0; senderPacketSize = s.packetSize || 0;
          senderProbing = !!s.probing;
          senderSweep = !!s.sweep;
          if (!wasSenderSweep && senderSweep) sweepResults = [];   // 新スイープ開始 → 結果クリア
          if (sweepActive() && typeof s.runId === "number" && s.runId !== currentRunId) {
            startNewRun(s.runId, s.patternLabel);   // 新パターン → 計測リセット (OTI 同一でも区切る)
          }
        } else {
          senderGrid = senderFps = null; senderTotalPackets = senderPacketSize = 0;
          senderProbing = false; senderSweep = false;
        }
        if (wasProbing && !senderProbing) clearForNewSession(); // プローブ終了 → 本番待ちで仕切り直し
        if (wasSenderSweep && !senderSweep) finalizeSweep();     // スイープ終了 → 最終結果を確定表示
        updateSenderInfo();
      } catch (e) { /* オフライン可 */ }
    }

    function updateSenderInfo() {
      const follow = $("followSender").checked || sweepActive();
      const sw = sweepActive() ? ` [スイープ#${currentRunId != null ? currentRunId : "?"}]` : "";
      $("senderInfo").textContent = senderGrid
        ? `送信側: grid ${senderGrid}${senderFps ? " @" + senderFps + "fps" : ""}${follow ? " (追従中)" : " (手動)"}${sw}`
        : `送信側: 未検出${follow ? " — 検出したら自動追従" : ""}`;
    }

    // ---- 受信側スイープ結果パネル ----
    // 各パターンの復元可否/秒数を受信側自身の画面に表示する。オフラインの人アシスト校正では
    // ここに出た「推奨設定」を人が読んで送信側へ反映する (バックチャネルの代わりに人の目を使う)。
    function recordSweepResult(ok) {
      if (currentRunId == null) return;
      if (sweepResults.some(r => r.runId === currentRunId)) return;   // 二重記録防止
      sweepResults.push({
        runId: currentRunId, label: currentRunLabel || `#${currentRunId}`,
        ok, recoverSec: ok ? recoverSec : null, unique: uniquePackets.size,
      });
      renderSweepResultsRecv(false);
    }

    function finalizeSweep() {
      // 最後のパターンが未復元なら NG 記録してから最終表示
      if (currentRunId != null && recoveredRunId !== currentRunId) recordSweepResult(false);
      renderSweepResultsRecv(true);
    }

    function renderSweepResultsRecv(done) {
      const el = $("sweepPanelRecv");
      if (!sweepResults.length) { el.style.display = "none"; return; }
      el.style.display = "block";
      const oks = sweepResults.filter(r => r.ok);
      const best = oks.length ? [...oks].sort((a, b) => (a.recoverSec || 1e9) - (b.recoverSec || 1e9))[0] : null;
      const sorted = [...sweepResults].sort((a, b) => {
        if (a.ok !== b.ok) return a.ok ? -1 : 1;
        return (a.recoverSec || 1e9) - (b.recoverSec || 1e9);
      });
      let html = `<b>スイープ結果</b> ${done ? "(完了)" : `(計測中 ${sweepResults.length}件)`}`;
      html += `<table style="border-collapse:collapse;width:100%;margin-top:4px;font-size:0.85em">` +
        `<tr><th>設定</th><th>結果</th><th>秒</th><th>uniq</th></tr>`;
      for (const r of sorted) {
        const style = best && r.runId === best.runId ? "background:#d8f5d8;font-weight:bold"
          : (r.ok ? "" : "color:#c44");
        html += `<tr style="${style}"><td>${r.label}</td><td>${r.ok ? "OK" : "NG"}</td>` +
          `<td>${r.recoverSec != null ? r.recoverSec : "—"}</td><td>${r.unique}</td></tr>`;
      }
      html += `</table>`;
      if (best) html += `<div style="margin-top:4px">→ この環境の推奨: <b>${best.label}</b> (${best.recoverSec}s)。送信側をこの設定に。</div>`;
      el.innerHTML = html;
    }

    async function postReceiverState() {
      const now = performance.now();
      const elapsedSec = lastWinResetTs ? (now - lastWinResetTs) / 1000 : 0;
      const rate = winFrames > 0 ? winReads / winFrames : 0;
      const scanFps = elapsedSec > 0 ? winFrames / elapsedSec : 0;
      lastWinResetTs = now;
      winFrames = 0; winReads = 0;
      const [r, c] = effectiveGrid.split("x").map(Number);
      const body = {
        grid: effectiveGrid, cells: r * c,
        decodeMs: +decodeMsAvg.toFixed(1),
        readsPerFrame: +rate.toFixed(2),
        scanFps: +scanFps.toFixed(1),
        settling: performance.now() < settlingUntil,
        framesScanned: totalAttempts, qrReads: successfulDecodes,
        uniquePackets: uniquePackets.size,
        payloadSize: decoder ? Number(decoder.payloadSize()) : 0,
        recovered: !!payload, oti: lastOtiHex,
        runId: currentRunId, recoveredRunId, recoverSec,
      };
      try { await fetch("/state/receiver", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }); } catch (e) { /* オフライン可 */ }
    }

    async function sendLog() {
      try {
        const text = Array.from(log.children).map(d => d.textContent).join("\n");
        const timing = timingEl.textContent;
        const meta = `=== ${new Date().toISOString()} ===\nUA: ${navigator.userAgent}\nframes: ${totalAttempts}, QR reads: ${successfulDecodes}, unique packets: ${uniquePackets.size}, grid: ${$("grid").value}\n--- timing ---\n${timing}\n=== log ===\n`;
        const res = await fetch("/log", {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: meta + text,
        });
        out(`[send] ${res.status} ${res.ok ? "OK" : "FAIL"}`, res.ok ? "ok" : "ng");
      } catch (e) {
        out(`[send] error: ${e.message || e}`, "ng");
      }
    }

    $("startBtn").addEventListener("click", () => startCamera());
    $("stopBtn").addEventListener("click", stop);
    $("sendLogBtn").addEventListener("click", sendLog);
    $("followSender").addEventListener("change", updateSenderInfo);
    $("sweepRecv").addEventListener("change", () => { if ($("sweepRecv").checked) sweepResults = []; updateSenderInfo(); });
    // 画面復帰時に Wake Lock を取り直す (バックグラウンドで自動解放されるため)
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && stream) {
        if (!wakeLock) requestWakeLock();
        if (performance.now() - lastFrameTs > 1000) {   // 復帰時に死んでいたら張り直す
          if (scanLoop) cancelAnimationFrame(scanLoop);
          lastFrameTs = performance.now();
          scanLoop = requestAnimationFrame(scanFrame);
        }
      }
    });

    out("[init] click \"カメラ開始\" to begin", "info");
  </script>
</body>
</html>
