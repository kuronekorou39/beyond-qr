<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>finder detection debug</title>
  <style>
    body { font-family: sans-serif; margin: 1em; background: #111; color: #eee; }
    canvas { border: 1px solid #444; max-width: 100%; }
    .ok { color: #6c6; }
    .ng { color: #f66; }
  </style>
</head>
<body>
  <h1>finder detection debug</h1>
  <div id="log"></div>
  <canvas id="cv"></canvas>

  <script type="module">
    async function loadImage(url) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      await new Promise((r, j) => { img.onload = r; img.onerror = j; img.src = url; });
      return img;
    }

    const log = document.getElementById("log");
    const out = (m, cls = "") => { const d = document.createElement("div"); d.className = cls; d.textContent = m; log.appendChild(d); };

    async function main() {
      const img = await loadImage("./samples/real_capture.png");
      const w = img.naturalWidth, h = img.naturalHeight;
      const cv = document.getElementById("cv");
      cv.width = w; cv.height = h;
      const ctx = cv.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, w, h).data;
      const rgb = new Uint8Array(w * h * 3);
      for (let i = 0, j = 0; i < data.length; i += 4, j += 3) {
        rgb[j] = data[i]; rgb[j+1] = data[i+1]; rgb[j+2] = data[i+2];
      }
      // Binary
      const darkThreshold = 64;
      const binary = new Uint8Array(w * h);
      for (let i = 0; i < w * h; i++) {
        const j = i * 3;
        binary[i] = (rgb[j] + rgb[j + 1] + rgb[j + 2]) / 3 < darkThreshold ? 1 : 0;
      }

      // 1:1:3:1:1 finder for each row
      function findRatioInLine(getVal, length, tol = 0.5, minUnit = 3) {
        const hits = [];
        let i = 0;
        const runs = [];
        while (i < length) {
          const v = getVal(i);
          const start = i;
          let n = 0;
          while (i < length && getVal(i) === v) { n++; i++; }
          runs.push([v, start, n]);
        }
        for (let k = 0; k + 4 < runs.length; k++) {
          const r = [runs[k], runs[k+1], runs[k+2], runs[k+3], runs[k+4]];
          if (r[0][0] !== 1 || r[1][0] !== 0 || r[2][0] !== 1 || r[3][0] !== 0 || r[4][0] !== 1) continue;
          const lens = [r[0][2], r[1][2], r[2][2], r[3][2], r[4][2]];
          const unit = (lens[0] + lens[1] + lens[3] + lens[4]) / 4;
          if (unit < minUnit) continue;
          const okU = (n) => Math.abs(n - unit) <= unit * tol;
          const ok3 = (n) => Math.abs(n - 3 * unit) <= 3 * unit * tol;
          if (okU(lens[0]) && okU(lens[1]) && ok3(lens[2]) && okU(lens[3]) && okU(lens[4])) {
            const center = r[2][1] + Math.floor(r[2][2] / 2);
            hits.push({ center, unit });
          }
        }
        return hits;
      }

      const rowHits = [];
      for (let y = 0; y < h; y++) {
        const hits = findRatioInLine((i) => binary[y * w + i], w);
        for (const hit of hits) rowHits.push({ x: hit.center, y, unit: hit.unit });
      }
      const colHits = [];
      for (let x = 0; x < w; x++) {
        const hits = findRatioInLine((i) => binary[i * w + x], h);
        for (const hit of hits) colHits.push({ x, y: hit.center, unit: hit.unit });
      }
      out(`row hits: ${rowHits.length}, col hits: ${colHits.length}`);

      // 各象限で row / col hit 数を集計
      const halfW = w / 2, halfH = h / 2;
      const quads = [
        ["TL", 0, 0, halfW, halfH],
        ["TR", halfW, 0, w, halfH],
        ["BL", 0, halfH, halfW, h],
        ["BR", halfW, halfH, w, h],
      ];
      for (const [name, xs, ys, xe, ye] of quads) {
        const rh = rowHits.filter(c => c.x >= xs && c.x < xe && c.y >= ys && c.y < ye);
        const ch = colHits.filter(c => c.x >= xs && c.x < xe && c.y >= ys && c.y < ye);
        const units = rh.map(c => c.unit.toFixed(1));
        const uniqueUnits = [...new Set(rh.map(c => Math.round(c.unit)))];
        out(`${name}: rh=${rh.length}, ch=${ch.length}, unique units (rh)=${uniqueUnits.sort((a,b)=>a-b)}`);
      }

      // row hits をマーカー表示
      ctx.fillStyle = "rgba(255,255,0,0.5)";
      for (const h of rowHits) {
        ctx.beginPath(); ctx.arc(h.x, h.y, 2, 0, Math.PI*2); ctx.fill();
      }
      ctx.fillStyle = "rgba(0,200,255,0.5)";
      for (const c of colHits) {
        ctx.beginPath(); ctx.arc(c.x, c.y, 2, 0, Math.PI*2); ctx.fill();
      }
    }
    main().catch(e => out(`[err] ${e}`, "ng"));
  </script>
</body>
</html>
