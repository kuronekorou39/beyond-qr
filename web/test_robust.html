<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>robustness test (歪みシミュレーション)</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin: 1em; }
    table { border-collapse: collapse; font-family: monospace; font-size: 0.85em; }
    th, td { border: 1px solid #444; padding: 2px 8px; text-align: center; }
    .y { color: #6c6; } .n { color: #f66; }
    #status { margin: 0.5em 0; }
    canvas { border: 1px solid #444; image-rendering: pixelated; }
  </style>
</head>
<body>
  <h1>robustness test: 歪みシミュレーション</h1>
  <p>合成画像に 回転 / 斜め(シアー) / 位置ずれ・縮小 / ブラー / ノイズ / 明るさ を加え、
     固定グリッド分割 (fixed) と スライディング窓 (sliding) で検出率・復元を比較する。
     <b>モアレ (画面画素×センサ画素の干渉) は忠実に再現できないため対象外。</b></p>
  <div id="status">実行中...</div>
  <table id="tbl">
    <thead><tr><th>scenario</th><th>grid</th><th>method</th><th>recovered</th><th>frames</th><th>reads/frame</th><th>unique/total</th></tr></thead>
    <tbody></tbody>
  </table>
  <div style="margin-top:1em"><canvas id="peek" width="500" height="500"></canvas><div>↑ 最後に処理した撮影フレーム (参考)</div></div>

  <script type="module">
    import init, { FountainEncoder, FountainDecoder } from "./pkg/beyond_qr_core_wasm.js";
    import { drawQRInCell, detectQRCodesGrid } from "./qr_util.js";

    const status = document.getElementById("status");
    const tbody = document.querySelector("#tbl tbody");
    const peek = document.getElementById("peek");
    const pctx = peek.getContext("2d");

    // 再現可能な簡易 PRNG
    let _seed = 1;
    const rnd = () => { _seed = (_seed * 1103515245 + 12345) & 0x7fffffff; return _seed / 0x7fffffff; };
    const rr = (a, b) => a + (b - a) * rnd();

    const screenCv = document.createElement("canvas"); screenCv.width = 1080; screenCv.height = 1080;
    const sctx = screenCv.getContext("2d");
    const capCv = document.createElement("canvas"); capCv.width = 1000; capCv.height = 1000;
    const cctx = capCv.getContext("2d", { willReadFrequently: true });

    const bbs = (b) => { let s = ""; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return s; };
    const buildQR = (data) => { const q = qrcode(0, "H"); q.addData(bbs(data), "Byte"); q.make(); return q; }; // 版は自動 (パケット長に合う最小版)
    const pkey = (b) => `${b[0]}_${b[1]}_${b[2]}_${b[3]}`;
    const packetFor = (rows, cols) => Math.max(80, Math.round(500 / Math.max(rows, cols))); // グリッドが大きいほど小パケット = 低版・小QR

    function renderScreen(enc, oti, cursor, rows, cols) {
      const total = enc.packetCount();
      sctx.fillStyle = "#fff"; sctx.fillRect(0, 0, screenCv.width, screenCv.height);
      const cw = screenCv.width / cols, ch = screenCv.height / rows;
      for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
        const idx = (cursor + r * cols + c) % total;
        const p = enc.packet(idx);
        const data = new Uint8Array(12 + p.length);
        data.set(oti, 0); data.set(p, 12);
        drawQRInCell(sctx, buildQR(data), c * cw, r * ch, cw, ch);
      }
    }

    function distortCapture(p) {
      const W = capCv.width, H = capCv.height;
      cctx.setTransform(1, 0, 0, 1, 0, 0);
      cctx.filter = "none";
      cctx.fillStyle = "#777"; cctx.fillRect(0, 0, W, H); // 画面の外側 (室内) を想定
      const drawW = W * p.scale, drawH = H * p.scale;
      cctx.save();
      cctx.filter = p.blur > 0 ? `blur(${p.blur}px)` : "none";
      cctx.translate(W / 2 + p.tx * W, H / 2 + p.ty * H);
      cctx.rotate(p.rot * Math.PI / 180);
      cctx.transform(1, p.shearY || 0, p.shearX || 0, 1, 0, 0); // 斜め (シアー)
      cctx.drawImage(screenCv, -drawW / 2, -drawH / 2, drawW, drawH);
      cctx.restore();
      if (p.noise > 0 || p.bright !== 0) {
        const img = cctx.getImageData(0, 0, W, H);
        const d = img.data;
        for (let i = 0; i < d.length; i += 4) {
          const nz = p.noise > 0 ? (rnd() * 2 - 1) * p.noise : 0;
          d[i] = Math.max(0, Math.min(255, d[i] + nz + p.bright));
          d[i + 1] = Math.max(0, Math.min(255, d[i + 1] + nz + p.bright));
          d[i + 2] = Math.max(0, Math.min(255, d[i + 2] + nz + p.bright));
        }
        cctx.putImageData(img, 0, 0);
      }
      return cctx.getImageData(0, 0, W, H);
    }

    const scenarios = [
      { name: "clean",    gen: () => ({ scale: rr(0.85, 0.92), tx: rr(-0.02, 0.02), ty: rr(-0.02, 0.02), rot: rr(-1.5, 1.5), shearX: 0, shearY: 0, blur: 0.3, noise: 0, bright: 0 }) },
      { name: "offset",   gen: () => ({ scale: rr(0.62, 0.82), tx: rr(-0.12, 0.12), ty: rr(-0.12, 0.12), rot: 0, shearX: 0, shearY: 0, blur: 0.5, noise: 0, bright: 0 }) },
      { name: "rotate",   gen: () => ({ scale: 0.82, tx: 0, ty: 0, rot: rr(-8, 8), shearX: 0, shearY: 0, blur: 0.5, noise: 0, bright: 0 }) },
      { name: "skew",     gen: () => ({ scale: 0.82, tx: 0, ty: 0, rot: 0, shearX: rr(-0.18, 0.18), shearY: rr(-0.10, 0.10), blur: 0.5, noise: 0, bright: 0 }) },
      { name: "combined", gen: () => ({ scale: rr(0.66, 0.82), tx: rr(-0.08, 0.08), ty: rr(-0.08, 0.08), rot: rr(-6, 6), shearX: rr(-0.10, 0.10), shearY: rr(-0.06, 0.06), blur: rr(0.5, 1.5), noise: rr(6, 16), bright: rr(-15, 15) }) },
    ];

    const combos = [[1, 1, "fixed"], [2, 2, "fixed"], [3, 3, "fixed"]];
    const MAXF = 30;

    function runCombo(scenario, rows, cols, method, payload) {
      _seed = 4242; // combo ごとに歪み列を固定して公平比較
      const ps = packetFor(rows, cols);
      const enc = new FountainEncoder(payload, ps, Math.ceil(payload.length / ps * 0.5));
      const oti = enc.otiBytes();
      const total = enc.packetCount();
      const dec = new FountainDecoder(oti);
      const seen = new Set();
      let cursor = 0, frames = 0, reads = 0, recovered = false;
      while (frames < MAXF) {
        renderScreen(enc, oti, cursor, rows, cols);
        cursor = (cursor + rows * cols) % total;
        const img = distortCapture(scenario.gen());
        const codes = detectQRCodesGrid(img, rows, cols);
        reads += codes.length;
        for (const b of codes) {
          if (b.length < 16) continue;
          const pk = b.slice(12);
          const k = pkey(pk);
          if (seen.has(k)) continue;
          seen.add(k);
          if (dec.addPacket(pk)) { recovered = true; break; }
        }
        frames++;
        if (recovered) break;
      }
      // 参考に最後のフレームを表示
      pctx.drawImage(capCv, 0, 0, peek.width, peek.height);
      return { recovered, frames, readsPerFrame: (reads / frames).toFixed(2), unique: seen.size, total };
    }

    async function main() {
      await init();
      const payload = new Uint8Array(1200);
      for (let i = 0; i < payload.length; i++) payload[i] = (i * 37 + 11) & 0xff;

      const summary = [];
      for (const sc of scenarios) {
        for (const [rows, cols, method] of combos) {
          status.textContent = `実行中... ${sc.name} ${rows}×${cols} ${method}`;
          await new Promise(requestAnimationFrame); // UI 更新を挟む
          let res;
          try { res = runCombo(sc, rows, cols, method, payload); }
          catch (e) { res = { recovered: false, frames: 0, readsPerFrame: "ERR", unique: 0, total: 0, err: e.message }; }
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${sc.name}</td><td>${rows}×${cols}</td><td>${method}</td>` +
            `<td class="${res.recovered ? "y" : "n"}">${res.recovered ? "YES" : "NO"}</td>` +
            `<td>${res.frames}</td><td>${res.readsPerFrame}</td><td>${res.unique}/${res.total}</td>`;
          tbody.appendChild(tr);
          summary.push(`RESULT | ${sc.name} | ${rows}x${cols} | ${method} | recovered=${res.recovered ? "Y" : "N"} | frames=${res.frames} | reads/frame=${res.readsPerFrame} | ${res.unique}/${res.total}${res.err ? " ERR:" + res.err : ""}`);
        }
      }
      // Playwright 用に機械可読でまとめて出力
      console.log(summary.join("\n"));
      status.textContent = "DONE";
      window.__done = true;
    }
    main().catch(e => { status.textContent = "ERR: " + (e.message || e); window.__done = true; });
  </script>
</body>
</html>
