<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>beyond-qr WASM smoke test</title>
  <style>
    body { font-family: sans-serif; margin: 2em; }
    pre { background: #f4f4f4; padding: 1em; overflow: auto; }
    .ok { color: #2a9d2a; }
    .ng { color: #c0392b; }
  </style>
</head>
<body>
  <h1>beyond-qr WASM smoke test</h1>
  <p>core-wasm を import してセルレベルの roundtrip を検証します。</p>
  <div id="log"></div>

  <script type="module">
    import init, {
      encode, decode, paletteRgb, maxPayloadBytes, totalCells,
    } from "./pkg/beyond_qr_core_wasm.js";

    const log = document.getElementById("log");
    const out = (msg, cls = "") => {
      const div = document.createElement("div");
      div.className = cls;
      div.textContent = msg;
      log.appendChild(div);
    };

    async function main() {
      await init();
      out("[init] WASM module loaded");

      // Phase 0 spec
      const spec = { gw: 128, gh: 128, cp: 8, fs: 7, crs: 64, cr: 1 };
      out(`[spec] grid=${spec.gw}x${spec.gh} cell=${spec.cp}px finder=${spec.fs} cal_start=${spec.crs}`);

      const total = totalCells(spec.gw, spec.gh, spec.cp, spec.fs, spec.crs, spec.cr);
      const maxP = maxPayloadBytes(spec.gw, spec.gh, spec.cp, spec.fs, spec.crs, spec.cr);
      out(`[spec] total_cells=${total} max_payload=${maxP}B`);

      // Palette
      const palette = paletteRgb();
      out(`[palette] ${palette.length} bytes: ${Array.from(palette).join(",")}`);

      // Encode + decode round-trip
      const payload = new Uint8Array(500);
      for (let i = 0; i < 500; i++) payload[i] = (i * 31 + 7) & 0xff;
      out(`[encode] payload ${payload.length}B`);

      const cells = encode(payload, spec.gw, spec.gh, spec.cp, spec.fs, spec.crs, spec.cr);
      out(`[encode] cells ${cells.length} (expected ${total})`);

      const decoded = decode(cells, spec.gw, spec.gh, spec.cp, spec.fs, spec.crs, spec.cr);
      out(`[decode] payload ${decoded.length}B`);

      const equal = decoded.length === payload.length && decoded.every((v, i) => v === payload[i]);
      out(`[verify] roundtrip ${equal ? "OK" : "FAIL"}`, equal ? "ok" : "ng");
    }

    main().catch(e => {
      out(`[error] ${e}`, "ng");
      console.error(e);
    });
  </script>
</body>
</html>
