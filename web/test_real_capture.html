<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>beyond-qr real capture debug</title>
  <style>
    body { font-family: sans-serif; margin: 1em; background: #111; color: #eee; }
    .ok { color: #6c6; }
    .ng { color: #f66; }
    canvas { border: 1px solid #444; max-width: 100%; image-rendering: auto; }
  </style>
</head>
<body>
  <h1>real capture debug</h1>
  <div id="log"></div>
  <canvas id="cv"></canvas>

  <script type="module">
    import init, { decode } from "./pkg/beyond_qr_core_wasm.js";
    import { findFinderCenters, decodeImageToCells, PHASE_0_SPEC } from "./algo.js";

    const log = document.getElementById("log");
    const out = (m, cls = "") => { const d = document.createElement("div"); d.className = cls; d.textContent = m; log.appendChild(d); };

    async function loadImage(url) {
      const img = new Image();
      img.crossOrigin = "anonymous";
      await new Promise((r, j) => { img.onload = r; img.onerror = j; img.src = url; });
      return img;
    }

    async function main() {
      await init();
      out("[init] WASM loaded");
      const img = await loadImage("./samples/real_capture.png");
      out(`[load] image ${img.naturalWidth}x${img.naturalHeight}`);
      const cv = document.getElementById("cv");
      cv.width = img.naturalWidth;
      cv.height = img.naturalHeight;
      const ctx = cv.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const data = ctx.getImageData(0, 0, cv.width, cv.height).data;
      const rgb = new Uint8Array(cv.width * cv.height * 3);
      for (let i = 0, j = 0; i < data.length; i += 4, j += 3) {
        rgb[j] = data[i]; rgb[j+1] = data[i+1]; rgb[j+2] = data[i+2];
      }

      const spec = PHASE_0_SPEC;
      const observed = findFinderCenters(rgb, cv.width, cv.height, spec.finderSize, spec.cellPx);
      out(`[finders] ${observed.map(([x,y]) => `(${x.toFixed(1)},${y.toFixed(1)})`).join(" ")}`);
      // 観測位置をマーカーで描画
      ctx.strokeStyle = "#ff0";
      ctx.lineWidth = 4;
      const labels = ["TL","TR","BL","BR"];
      observed.forEach(([x,y], i) => {
        ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle = "#ff0"; ctx.font = "bold 24px sans-serif";
        ctx.fillText(labels[i], x + 30, y - 10);
      });

      try {
        const cells = decodeImageToCells(rgb, cv.width, cv.height, spec);
        out(`[algo] cells: ${cells.length}`);
        try {
          const payload = decode(cells, spec.gridWidth, spec.gridHeight, spec.cellPx, spec.finderSize, spec.calibrationRowStart, spec.calibrationRows);
          out(`[decode] OK ${payload.length}B`, "ok");
        } catch (e) {
          out(`[decode] FAIL ${e.message || e}`, "ng");
        }
      } catch (e) {
        out(`[algo] threw ${e.message || e}`, "ng");
      }
    }
    main().catch(e => out(`[err] ${e}`, "ng"));
  </script>
</body>
</html>
