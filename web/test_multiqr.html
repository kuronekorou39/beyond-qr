<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>multi-QR integrated test</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    body { font-family: sans-serif; background: #111; color: #eee; margin: 1em; }
    .ok { color: #6c6; } .ng { color: #f66; }
    #log div { font-family: monospace; margin: 2px 0; }
    canvas { background: #fff; image-rendering: pixelated; width: 320px; height: 320px; border: 1px solid #444; }
  </style>
</head>
<body>
  <h1>multi-QR integrated test</h1>
  <p>grid 描画 → detectQRCodes で複数抽出 → Fountain 復元 → byte 一致 (カメラ不要)。sender/receiver と同じ qr_util.js を使用。</p>
  <div id="log"></div>
  <canvas id="cv" width="1500" height="1500"></canvas>

  <script type="module">
    import init, { FountainEncoder, FountainDecoder } from "./pkg/beyond_qr_core_wasm.js";
    import { drawQRInCell, detectQRCodesGrid } from "./qr_util.js";

    const log = document.getElementById("log");
    const out = (m, c = "") => { const d = document.createElement("div"); d.className = c; d.textContent = m; log.appendChild(d); };
    const cv = document.getElementById("cv");
    const ctx = cv.getContext("2d", { willReadFrequently: true });

    const bytesToBinaryString = (b) => { let s = ""; for (let i = 0; i < b.length; i++) s += String.fromCharCode(b[i]); return s; };
    const buildQR = (data, ver, ec) => { const qr = qrcode(ver, ec); qr.addData(bytesToBinaryString(data), "Byte"); qr.make(); return qr; };
    const packetKey = (b) => `${b[0]}_${b[1]}_${b[2]}_${b[3]}`;

    async function runGrid(rows, cols, payload) {
      const N = rows * cols;
      const enc = new FountainEncoder(payload, 500, Math.ceil(payload.length / 500 * 0.5));
      const oti = enc.otiBytes();
      const total = enc.packetCount();
      const dec = new FountainDecoder(oti);
      const seen = new Set();
      let cursor = 0, frames = 0, rawDetected = 0, recovered = null;
      const maxFrames = 2000;

      while (frames < maxFrames) {
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, cv.width, cv.height);
        const cw = cv.width / cols, ch = cv.height / rows;
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const idx = (cursor + r * cols + c) % total;
            const p = enc.packet(idx);
            const data = new Uint8Array(12 + p.length);
            data.set(oti, 0); data.set(p, 12);
            drawQRInCell(ctx, buildQR(data, 25, "H"), c * cw, r * ch, cw, ch);
          }
        }
        cursor = (cursor + N) % total;
        frames++;

        const img = ctx.getImageData(0, 0, cv.width, cv.height);
        const codes = detectQRCodesGrid(img, rows, cols);
        rawDetected += codes.length;
        for (const bytes of codes) {
          if (bytes.length < 16) continue;
          const packet = bytes.slice(12);
          const k = packetKey(packet);
          if (seen.has(k)) continue;
          seen.add(k);
          if (dec.addPacket(packet)) { recovered = dec.payload(); break; }
        }
        if (recovered) break;
      }

      const avgRaw = (rawDetected / frames).toFixed(2);
      if (!recovered) {
        out(`[${rows}×${cols}] FAIL: ${frames} frames で未復元 (raw QR/frame=${avgRaw}, target ${N}, total packets=${total})`, "ng");
        return false;
      }
      let eq = recovered.length === payload.length;
      if (eq) for (let i = 0; i < payload.length; i++) if (recovered[i] !== payload[i]) { eq = false; break; }
      out(`[${rows}×${cols}] ${eq ? "PASS" : "FAIL"}: ${recovered.length}B byte-exact=${eq} | frames=${frames} | raw QR/frame=${avgRaw} (target ${N}) | total packets=${total}`, eq ? "ok" : "ng");
      return eq;
    }

    async function main() {
      await init();
      out("[init] WASM loaded");
      const payload = new Uint8Array(4000);
      for (let i = 0; i < payload.length; i++) payload[i] = (i * 37 + 11) & 0xff;
      out(`[payload] ${payload.length}B`);

      let allPass = true;
      for (const [r, c] of [[1, 1], [2, 2], [3, 3]]) {
        try {
          allPass = (await runGrid(r, c, payload)) && allPass;
        } catch (e) {
          out(`[${r}×${c}] ERROR ${e.message || e}`, "ng");
          allPass = false;
        }
      }
      out(allPass ? "=== ALL PASS ===" : "=== SOME FAILED ===", allPass ? "ok" : "ng");
    }
    main().catch(e => out(`[err] ${e.message || e}`, "ng"));
  </script>
</body>
</html>
