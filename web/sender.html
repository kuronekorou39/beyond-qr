<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>beyond-qr Sender</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; background: #fff; color: #222; }
    .toolbar {
      padding: 0.5em 1em; border-bottom: 1px solid #ccc;
      display: flex; gap: 0.5em; align-items: center; flex-wrap: wrap;
    }
    .toolbar input, .toolbar button, .toolbar select { padding: 0.4em 0.8em; font-size: 0.95em; }
    .toolbar textarea { width: 320px; height: 60px; font-family: monospace; font-size: 0.85em; }
    button { background: #fc4; border: none; border-radius: 4px; cursor: pointer; }
    button.secondary { background: #ddd; }
    button.preset { background: #eee; min-width: 2.4em; padding: 0.4em 0.5em; }
    button:disabled { background: #eee; color: #888; cursor: not-allowed; }
    .feedback-bar {
      padding: 0.45em 1em; background: #f7f7f7; border-bottom: 1px solid #ddd;
      font-size: 0.88em; display: flex; gap: 1em; align-items: center; flex-wrap: wrap;
    }
    .feedback-bar .muted { color: #999; }
    .feedback-bar .advice { font-weight: bold; }
    .feedback-bar button { background: #fc4; border: none; border-radius: 4px; padding: 0.2em 0.6em; margin-left: 0.3em; cursor: pointer; font-size: 0.9em; }
    :root { --qr-size: 90vmin; }
    .stage { display: flex; justify-content: center; align-items: center; padding: 1vmin; background: #fff; }
    #qrCanvas { width: var(--qr-size); height: var(--qr-size); image-rendering: pixelated; background: #fff; }
    .size-group { display: inline-flex; gap: 4px; align-items: center; }
    .size-group input[type="range"] { width: 110px; vertical-align: middle; }
    .status {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 0.3em 1em; background: #f0f0f0; border-top: 1px solid #ccc;
      font-family: monospace; font-size: 0.85em;
    }
    .help { max-width: 820px; margin: 0 auto; padding: 1em; font-size: 0.9em; color: #555; }
    .fps-group { display: inline-flex; gap: 2px; align-items: center; }
    .probe-results {
      position: fixed; top: 8px; right: 8px; z-index: 100;
      max-width: min(440px, 92vw); max-height: 84vh; overflow: auto;
      padding: 0 1em 0.6em; background: #fffbe6; border: 1px solid #e6d98a;
      border-radius: 6px; box-shadow: 0 4px 18px rgba(0,0,0,0.28); font-size: 0.85em;
    }
    .probe-head { position: sticky; top: 0; display: flex; justify-content: flex-end; padding-top: 0.4em; background: #fffbe6; }
    .probe-close { background: #e6d98a; border: none; border-radius: 4px; width: 1.8em; height: 1.8em; line-height: 1; font-weight: bold; cursor: pointer; }
    .probe-results table { border-collapse: collapse; margin-top: 0.3em; }
    .probe-results th, .probe-results td { border: 1px solid #ddd; padding: 2px 8px; text-align: center; }
    .probe-results tr.best { background: #d8f5d8; font-weight: bold; }
    .probe-results button[data-apply] { background: #fc4; border: none; border-radius: 4px; padding: 0.15em 0.6em; cursor: pointer; font-size: 0.9em; }
    .sweep-panel {
      position: fixed; top: 8px; left: 8px; z-index: 100;
      max-width: min(460px, 46vw); max-height: 86vh; overflow: auto;
      padding: 0.4em 0.8em 0.6em; background: #eef6ff; border: 1px solid #9cc3e6;
      border-radius: 6px; box-shadow: 0 4px 18px rgba(0,0,0,0.28); font-size: 0.82em;
    }
    .sweep-panel .sweep-head { position: sticky; top: 0; background: #eef6ff; padding: 0.3em 0; }
    .sweep-panel table { border-collapse: collapse; margin-top: 0.3em; }
    .sweep-panel th, .sweep-panel td { border: 1px solid #cdd; padding: 1px 6px; text-align: center; }
    .sweep-panel tr.best { background: #d8f5d8; font-weight: bold; }
    .sweep-panel tr.fail { color: #c44; }
  </style>
</head>
<body>
  <div class="toolbar">
    <textarea id="payloadText" placeholder="ペイロード (テキスト入力 or ファイル選択)"></textarea>
    <input type="file" id="payloadFile">
    <input type="text" id="envLabel" placeholder="環境ラベル (例: 50cm/明室/iPhone)" title="スイープログに記録される。距離・明るさ・端末などを書く" style="min-width:200px">
    <label>グリッド: <select id="grid">
      <option value="1x1">1×1</option>
      <option value="1x2" selected>1×2</option>
      <option value="2x2">2×2</option>
      <option value="2x3">2×3</option>
      <option value="3x3">3×3</option>
    </select></label>
    <span class="fps-group">FPS:
      <input type="number" id="fps" value="12" min="1" max="60" style="width: 56px">
      <button type="button" class="preset" data-fps="5">5</button>
      <button type="button" class="preset" data-fps="10">10</button>
      <button type="button" class="preset" data-fps="15">15</button>
      <button type="button" class="preset" data-fps="24">24</button>
      <button type="button" class="preset" data-fps="30">30</button>
    </span>
    <label>EC: <select id="ecLevel">
      <option value="L">L (高容量)</option>
      <option value="M" selected>M</option>
      <option value="Q">Q</option>
      <option value="H">H (高訂正)</option>
    </select></label>
    <label>QR Ver(0=自動): <input type="number" id="qrVersion" value="0" min="0" max="40" style="width: 60px"></label>
    <label class="size-group">表示:
      <input type="range" id="dispSize" min="40" max="100" step="1" value="90">
      <span id="dispSizeVal">90%</span>
    </label>
    <button id="startBtn">送信開始</button>
    <button id="stopBtn" class="secondary" disabled>停止</button>
    <button id="probeBtn" class="secondary" title="grid×FPS を総当りで試し最適設定を探す">調べる(プローブ)</button>
    <button id="sweepBtn" class="secondary" title="入力した実画像を grid×FPS で総当りし、各設定で復元完了まで計測 (無人スイープ)">実データスイープ</button>
  </div>
  <div class="feedback-bar">
    <label title="効率が下がったら自動でグリッドを下げる"><input type="checkbox" id="autoAdjust"> 自動調整</label>
    <span id="feedback" class="muted">受信側 未接続</span>
  </div>
  <div id="probeResults" class="probe-results" style="display:none">
    <div class="probe-head"><button id="probeClose" class="probe-close" title="閉じる">×</button></div>
    <div id="probeBody"></div>
  </div>
  <div id="sweepPanel" class="sweep-panel" style="display:none"></div>
  <div class="stage">
    <canvas id="qrCanvas" width="1080" height="1080"></canvas>
  </div>
  <div class="help">
    <strong>使い方:</strong> ペイロードを入力 (or ファイル選択) → グリッドを選んで「送信開始」→ F11 で全画面化 → スマホ receiver でカメラ開始。
    受信側の読み取り状況が上のバーに表示され、効率が低いと下げる助言が出ます (受信側は送信グリッドに自動追従するので手動一致は不要)。
    グリッドを上げると 1 フレームで複数パケット送れる (パケットサイズは自動縮小) が、斜め・位置ずれに弱くなる。まず 1×1、安定したら 2×2。
  </div>
  <div class="status" id="status">準備完了</div>

  <script type="module">
    import init, { FountainEncoder } from "./pkg/beyond_qr_core_wasm.js";
    import { drawQRInCell } from "./qr_util.js";

    const $ = (id) => document.getElementById(id);
    const canvas = $("qrCanvas");
    const ctx = canvas.getContext("2d");
    const status = $("status");

    let encoder = null;
    let packetCursor = 0;   // 次フレーム先頭で送るパケット番号
    let frameCount = 0;
    let timer = null;
    let otiBytes = null;
    let currentOtiHex = null;
    let statePollTimer = null;  // 受信状況ポーリング + 自設定 POST
    let recvState = null;       // 直近の受信側状態 (/state より)
    let poorSince = 0;          // 効率低下が続いた開始時刻 (自動調整用)
    let lastAutoStepTs = 0;     // 自動段下げのクールダウン用
    let startSeq = 0;           // start() 再入ガード (世代カウンタ)
    let currentPacketSize = 500;
    let probing = false, probeConfig = null;  // プローブ(調べる)モード
    let sweeping = false, sweepRunId = 0;     // 実データ自動スイープ (runId で受信側と1パターンを同期)
    const GRID_ORDER = ["1x1", "1x2", "2x2", "2x3", "3x3"]; // セル数 昇順
    // パケットサイズは grid ごとの実測ベストを使う (プロファイルスイープで最適点を確定)。
    // EC=M / 版=自動 前提。多グリッドはタイルを低版に振った方が「各タイルを確実に読む」ので速い。
    // 実測: 1x2 M300 @12fps が最速 (211KB を 36秒 / 5.83KB/s)。1x1=540 は v18@M の容量上限付近。
    // 未定義 grid は 200/max にフォールバック。閾値はこの環境 (iPhone/固定) 依存なので運用で調整可。
    const PACKET_BY_GRID = { "1x1": 540, "1x2": 300, "2x2": 180, "2x3": 160, "3x3": 140 };
    const packetSizeFor = (rows, cols) =>
      PACKET_BY_GRID[`${rows}x${cols}`] || Math.max(120, Math.round(200 / Math.max(rows, cols)));

    const setStatus = (msg) => { status.textContent = msg; };
    const pct = (x) => Math.round(x * 100);

    // メタデータ (ファイル名 + MIME) をペイロード先頭に埋め込む。
    // 形式: [4 byte BE: header JSON length N] [N byte UTF-8 JSON] [actual payload]
    function wrapPayload(name, mimeType, body) {
      const headerBytes = new TextEncoder().encode(JSON.stringify({ name, type: mimeType, size: body.length }));
      const out = new Uint8Array(4 + headerBytes.length + body.length);
      new DataView(out.buffer).setUint32(0, headerBytes.length, false);
      out.set(headerBytes, 4);
      out.set(body, 4 + headerBytes.length);
      return out;
    }

    async function getPayload() {
      const fileInput = $("payloadFile");
      if (fileInput.files.length > 0) {
        const f = fileInput.files[0];
        const body = new Uint8Array(await f.arrayBuffer());
        return wrapPayload(f.name, f.type || "application/octet-stream", body);
      }
      const body = new TextEncoder().encode($("payloadText").value);
      return wrapPayload("message.txt", "text/plain;charset=utf-8", body);
    }

    function bytesToBinaryString(bytes) {
      // qrcode-generator の default モードでは char code の下位 8 bit が byte として扱われる
      let s = "";
      for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]);
      return s;
    }

    function buildQR(data, version, ecLevel) {
      const qr = qrcode(version, ecLevel);
      qr.addData(bytesToBinaryString(data), "Byte");
      qr.make();
      return qr;
    }

    function gridDims() {
      const [rows, cols] = $("grid").value.split("x").map(Number);
      return { rows, cols };
    }

    function renderFrame() {
      if (!encoder) return;
      const { rows, cols } = gridDims();
      const n = rows * cols;
      const total = encoder.packetCount();
      const vv = parseInt($("qrVersion").value) || 0;
      const version = (sweeping || vv <= 0) ? 0 : vv;   // 0 または スイープ中は自動最小版 (密度を最適化)
      const ecLevel = $("ecLevel").value;

      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const cellW = canvas.width / cols;
      const cellH = canvas.height / rows;
      const firstIdx = packetCursor % total;

      try {
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const idx = (packetCursor + r * cols + c) % total;
            const packet = encoder.packet(idx);
            // 各 QR に OTI を埋め込む (受信側がいつでも復号開始できる)
            const data = new Uint8Array(12 + packet.length);
            data.set(otiBytes, 0);
            data.set(packet, 12);
            const qr = buildQR(data, version, ecLevel);
            drawQRInCell(ctx, qr, c * cellW, r * cellH, cellW, cellH);
          }
        }
      } catch (e) {
        setStatus(`QR 生成失敗 (パケットが QR 容量超過の可能性。QR Ver を上げる): ${e.message}`);
        stop();
        return;
      }

      const lastIdx = (packetCursor + n - 1) % total;
      packetCursor = (packetCursor + n) % total;
      frameCount++;
      setStatus(`frame ${frameCount} | grid ${rows}×${cols} (${n} QR/frame) | packets ${firstIdx}–${lastIdx} / ${total}`);
    }

    async function start() {
      if (probing || sweeping) return;                   // プローブ/スイープ中は通常送信しない
      const mySeq = ++startSeq;                          // 再入ガード
      if (timer) { clearInterval(timer); timer = null; }
      await init();
      const payload = await getPayload();
      if (mySeq !== startSeq) return;                    // 別の start() に追い越された → 破棄 (二重起動防止)
      if (payload.length === 0) { setStatus("ペイロードが空です"); return; }
      const { rows, cols } = gridDims();
      const packetSize = packetSizeFor(rows, cols);
      currentPacketSize = packetSize;
      const extraRepair = Math.ceil(payload.length / packetSize * 0.5);
      encoder = new FountainEncoder(payload, packetSize, extraRepair);
      otiBytes = encoder.otiBytes();
      currentOtiHex = Array.from(otiBytes).map(b => b.toString(16).padStart(2, "0")).join("");
      packetCursor = 0;
      frameCount = 0;
      poorSince = 0;
      $("startBtn").disabled = true;
      $("stopBtn").disabled = false;
      setStatus(`payload ${payload.length}B → ${encoder.packetCount()} packets (${packetSize}B/QR, grid ${rows}×${cols}), OTI=${currentOtiHex}`);
      renderFrame();
      timer = setInterval(renderFrame, 1000 / parseInt($("fps").value));
      // バックチャネル: 自設定を流し、受信状況を取りに行く
      if (!statePollTimer) statePollTimer = setInterval(() => { postSenderState(!!timer); pollReceiver(); }, 900);
      postSenderState(true);
      pollReceiver();
    }

    function stop() {
      if (timer) clearInterval(timer);
      timer = null;
      if (statePollTimer) { clearInterval(statePollTimer); statePollTimer = null; }
      $("startBtn").disabled = false;
      $("stopBtn").disabled = true;
      postSenderState(false);
    }

    function applyFps(v) {
      if (probing || sweeping) return;
      $("fps").value = v;
      if (timer) { clearInterval(timer); timer = setInterval(renderFrame, 1000 / v); }
      if (encoder) postSenderState(!!timer);
    }

    function applyGrid(g) {
      if (probing || sweeping || !GRID_ORDER.includes(g)) return;
      $("grid").value = g;
      poorSince = 0;
      if (timer) start().catch(e => setStatus(`error: ${e.message}`)); // 新グリッドで再エンコード (新 OTI → 受信側は自動 resync)
    }

    // ---- バックチャネル (同一 LAN の serve_https.py 経由) ----
    async function postSenderState(running) {
      const { rows, cols } = gridDims();
      const body = {
        grid: $("grid").value, fps: parseInt($("fps").value), cells: rows * cols,
        oti: currentOtiHex, packetSize: currentPacketSize,
        totalPackets: encoder ? encoder.packetCount() : 0, running: !!running,
        probing, probeConfig: probing ? probeConfig : null,
      };
      try { await fetch("/state/sender", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }); } catch (e) { /* オフライン可 */ }
    }

    async function pollReceiver() {
      try {
        const r = await fetch("/state", { cache: "no-store" });
        if (!r.ok) return;
        const st = await r.json();
        const recv = st.receiver || {};
        recvState = (recv._ts && (st.now - recv._ts) < 4) ? recv : null;
        renderFeedback();
        maybeAutoAdjust();
      } catch (e) { /* オフライン可 */ }
    }

    function effOf(recv) {
      const cells = recv.cells || 1;
      return recv.readsPerFrame ? Math.min(1, recv.readsPerFrame / cells) : 0;
    }

    let lastFeedbackKey = "";
    function renderFeedback() {
      const fb = $("feedback");
      if (probing) { fb.className = "muted"; fb.textContent = "プローブ中... (下の表で測定結果を確認)"; lastFeedbackKey = "probing"; return; }
      let cls, html;
      if (!recvState) {
        cls = "muted";
        html = "受信側 未接続 — スマホで receiver.html を開いてカメラ開始してください";
      } else {
        cls = "";
        const r = recvState;
        const eff = effOf(r);
        const curGrid = $("grid").value;
        const lowerGrid = GRID_ORDER[Math.max(0, GRID_ORDER.indexOf(curGrid) - 1)];
        let advice = "", buttons = "";
        if (r.recovered) {
          advice = "✅ 受信側で復元完了!";
        } else if (eff < 0.4 && curGrid !== "1x1") {
          advice = `⚠️ 効率 ${pct(eff)}% と低い (${r.readsPerFrame} QR/frame / ${r.cells})。グリッドを下げると改善するかも。`;
          buttons = `<button data-act="grid" data-val="${lowerGrid}">${lowerGrid} に下げる</button>`;
        } else if (eff < 0.4 && curGrid === "1x1") {
          advice = `⚠️ 読み取りが弱い (効率 ${pct(eff)}%)。距離・手ぶれ・明るさを調整するか FPS を下げる。`;
          buttons = `<button data-act="fps" data-val="10">FPS 10</button><button data-act="fps" data-val="5">FPS 5</button>`;
        } else {
          advice = `🟢 良好 (効率 ${pct(eff)}%)`;
        }
        const head = `<b>受信側:</b> grid ${r.grid || "?"} | ${r.readsPerFrame ?? "?"} QR/frame | unique ${r.uniquePackets ?? 0} | ${r.recovered ? "<b style='color:#2a2'>復元済</b>" : "受信中"}`;
        html = `${head} &nbsp; <span class="advice">${advice}</span> ${buttons}`;
      }
      // 内容が変わらない限り DOM を触らない (900ms ごとの再生成でボタンが detach されてクリックを阻害するのを防ぐ)
      const key = cls + "|" + html;
      if (key === lastFeedbackKey) return;
      lastFeedbackKey = key;
      fb.className = cls;
      fb.innerHTML = html;
    }

    function maybeAutoAdjust() {
      if (probing || sweeping || !$("autoAdjust").checked || !timer || !recvState || recvState.recovered) { poorSince = 0; return; }
      if (recvState.settling) { poorSince = 0; return; }       // 受信側が再同期直後の過渡期は評価しない
      if (performance.now() - lastAutoStepTs < 5000) return;   // 段下げ直後のクールダウン (過渡期 > これ)
      const eff = effOf(recvState);
      const curGrid = $("grid").value;
      if (eff < 0.4 && curGrid !== "1x1") {
        if (!poorSince) poorSince = performance.now();
        else if (performance.now() - poorSince > 3000) {
          const lower = GRID_ORDER[Math.max(0, GRID_ORDER.indexOf(curGrid) - 1)];
          poorSince = 0;
          lastAutoStepTs = performance.now();
          setStatus(`[自動調整] 効率低下のため ${curGrid} → ${lower}`);
          applyGrid(lower);
        }
      } else {
        poorSince = 0;
      }
    }

    // ---- プローブ(調べる)モード: 実環境で grid×FPS を総当りし、実効スループットで最適設定を探す ----
    const PROBE_GRIDS = ["1x1", "2x2", "3x3"];
    const PROBE_FPS = [5, 10, 15];
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));

    function makeDummyPayload(n) {
      const a = new Uint8Array(n);
      for (let i = 0; i < n; i++) a[i] = (i * 131 + 7) & 0xff;
      return a;
    }

    async function sampleReceiver() {
      try {
        const r = await fetch("/state", { cache: "no-store" });
        if (!r.ok) return null;
        const st = await r.json();
        const recv = st.receiver || {};
        return (recv._ts && (st.now - recv._ts) < 4) ? recv : null;
      } catch (e) { return null; }
    }

    async function runProbe() {
      if (probing || sweeping) return;
      if (timer) { clearInterval(timer); timer = null; }   // 通常送信を止める
      probing = true;
      $("startBtn").disabled = true;
      $("stopBtn").disabled = true;
      $("probeBtn").disabled = true;
      $("probeResults").style.display = "block";
      $("probeBody").innerHTML = "プローブ準備中... スマホで receiver のカメラを開始し、画面に向けてください";
      const createdPoller = !statePollTimer;
      try {
        await init();
        const dummy = makeDummyPayload(300 * 1024);        // 大きめ → 測定中に復元しない
        if (!statePollTimer) statePollTimer = setInterval(() => { postSenderState(!!timer); pollReceiver(); }, 900);
        const mean = (arr, k) => arr.length ? arr.reduce((s, x) => s + x[k], 0) / arr.length : 0;
        const results = [];
        for (const g of PROBE_GRIDS) {
          for (const f of PROBE_FPS) {
            $("grid").value = g; $("fps").value = String(f);
            const { rows, cols } = gridDims();
            const packetSize = packetSizeFor(rows, cols);
            currentPacketSize = packetSize;
            const extraRepair = Math.ceil(dummy.length / packetSize * 0.5);
            encoder = new FountainEncoder(dummy, packetSize, extraRepair);
            otiBytes = encoder.otiBytes();
            currentOtiHex = Array.from(otiBytes).map(b => b.toString(16).padStart(2, "0")).join("");
            packetCursor = 0; frameCount = 0;
            probeConfig = `${g}@${f}`;
            if (timer) clearInterval(timer);
            timer = setInterval(renderFrame, 1000 / f);
            postSenderState(true);                         // probing:true を即流す
            // settle: 受信側が実際にこのグリッドへ追従し落ち着くまで待つ (最大3s。固定 sleep より正確)
            setStatus(`プローブ: ${g} @ ${f}fps (受信側の追従待ち...)`);
            const settleEnd = performance.now() + 3000;
            while (performance.now() < settleEnd) {
              const recv = await sampleReceiver();
              if (recv && recv.grid === g && !recv.settling) break;
              await sleep(300);
            }
            // 測定窓
            setStatus(`プローブ: ${g} @ ${f}fps (測定中...)`);
            const samples = [];
            const tEnd = performance.now() + 3500;
            while (performance.now() < tEnd) {
              const recv = await sampleReceiver();
              if (recv && recv.grid === g && !recv.settling && typeof recv.readsPerFrame === "number" && recv.scanFps) {
                samples.push({ rpf: recv.readsPerFrame, fps: recv.scanFps });
              }
              await sleep(500);
            }
            const rpf = mean(samples, "rpf"), sfps = mean(samples, "fps");
            const goodput = rpf * packetSize * sfps;        // 実効スループット (bytes/sec)
            results.push({ grid: g, fps: f, cells: rows * cols, packetSize, rpf: +rpf.toFixed(2), sfps: +sfps.toFixed(1), goodput, n: samples.length });
            showProbeResults(results, false);
          }
        }
        showProbeResults(results, true);
        setStatus("プローブ完了。最良設定を選んでください。");
      } finally {
        // 例外・途中終了でも必ず状態を戻す (probing 解除・タイマー解放・受信側のプローブモード解除)
        if (timer) { clearInterval(timer); timer = null; }
        if (createdPoller && statePollTimer) { clearInterval(statePollTimer); statePollTimer = null; }
        probing = false; probeConfig = null;
        postSenderState(false);
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        $("startBtn").disabled = false;
        $("stopBtn").disabled = true;
        $("probeBtn").disabled = false;
      }
    }

    function showProbeResults(results, done) {
      const sorted = [...results].sort((a, b) => b.goodput - a.goodput);
      const best = sorted[0];
      const total = PROBE_GRIDS.length * PROBE_FPS.length;
      let html = done && best
        ? `<b>プローブ結果</b>(実効スループット順)。最良 <b>${best.grid} @ ${best.fps}fps</b> ≈ ${(best.goodput / 1024).toFixed(1)} KB/s。受信できていない(全0)なら撮影距離/明るさ/手ぶれを見直してください。<br>`
        : `<b>プローブ中...</b> (${results.length}/${total})<br>`;
      html += `<table><tr><th>grid</th><th>FPS</th><th>QR/frame</th><th>scan FPS</th><th>実効 KB/s</th><th></th></tr>`;
      for (const r of sorted) {
        const isBest = done && r === best && best.goodput > 0;
        html += `<tr class="${isBest ? "best" : ""}"><td>${r.grid}</td><td>${r.fps}</td><td>${r.rpf}</td><td>${r.sfps}</td><td>${(r.goodput / 1024).toFixed(1)}</td>` +
          `<td><button data-apply="1" data-grid="${r.grid}" data-fps="${r.fps}">この設定で送信</button></td></tr>`;
      }
      html += `</table>`;
      $("probeBody").innerHTML = html;
    }

    $("startBtn").addEventListener("click", () => start().catch(e => setStatus(`error: ${e.message}`)));
    $("stopBtn").addEventListener("click", () => {
      if (sweeping) { sweeping = false; setStatus("スイープ中断要求 — 現在のパターンの後に停止します"); }
      else stop();
    });
    document.querySelectorAll("button.preset").forEach(b =>
      b.addEventListener("click", () => applyFps(parseInt(b.dataset.fps)))
    );
    $("feedback").addEventListener("click", (e) => {
      const b = e.target.closest("button");
      if (!b) return;
      if (b.dataset.act === "grid") applyGrid(b.dataset.val);
      else if (b.dataset.act === "fps") applyFps(parseInt(b.dataset.val));
    });
    $("probeBtn").addEventListener("click", () => runProbe().catch(e => setStatus(`probe error: ${e.message}`)));
    $("probeResults").addEventListener("click", (e) => {
      const b = e.target.closest("button[data-apply]");
      if (!b) return;
      $("grid").value = b.dataset.grid; $("fps").value = b.dataset.fps;
      setStatus(`設定を適用: grid ${b.dataset.grid} @ ${b.dataset.fps}fps — ペイロードを入れて「送信開始」`);
    });
    $("probeClose").addEventListener("click", () => { $("probeResults").style.display = "none"; });

    // ---- 表示サイズ (QR canvas の見かけサイズを vmin% で可変。localStorage に保存) ----
    function applyDispSize(v) {
      document.documentElement.style.setProperty("--qr-size", v + "vmin");
      $("dispSizeVal").textContent = v + "%";
    }
    try { const saved = localStorage.getItem("beyondqr.dispSize"); if (saved) $("dispSize").value = saved; } catch (e) { /* 非対応可 */ }
    applyDispSize($("dispSize").value);
    $("dispSize").addEventListener("input", () => {
      applyDispSize($("dispSize").value);
      try { localStorage.setItem("beyondqr.dispSize", $("dispSize").value); } catch (e) { /* 非対応可 */ }
    });

    // ================= 実データ自動スイープ =================
    // 入力した実画像を grid×FPS で総当りし、各パターンで「復元完了まで」を計測する。
    // QR版は自動最小化 (renderFrame が sweeping 中は version 0)。受信側とは /state の runId で
    // 1パターンの境界を同期 (grid 据え置きで FPS だけ変えると OTI が同一になるため、OTI では区切れない)。
    // 1パターンが SWEEP_TIMEOUT_MS 内に復元できなければ TIMEOUT 記録して次へ。無人運用前提。
    // ↓ プロファイル (robust→aggressive) を編集すれば対象を変えられる。
    // 各プロファイルは {grid, ec, packet, fps} を明示指定。QR版は renderFrame が自動最小化するので
    // (packet+OTI12B, ec) から決まる最小版が使われる = 環境の読み取り上限を超えたものは NG になり、
    // 「どの grid/packet/ec までこの環境で復元できるか」のケイパビリティ地図が得られる。
    // 3x3 は throughput 律速のため一旦除外 (1x1/1x2/2x2 が安定してから再挑戦)。
    // 受信側の多グリッド解像度を下げた (jsQR 軽量化=scanFps↑) のに合わせ、多グリッドは
    // タイルを低版に振って「各タイルを確実に読む」方向へ。QR/frame をタイル数まで上げるのが狙い。
    // 初回スイープで 1x2/2x2 の可読性は確認済み。ここは throughput 最適点を探る。
    // Phase 2: 距離ごとにグリッド横断で比較 (近づくほど多グリッドが有利になるはず)。
    const SWEEP_PROFILES = [
      { grid: "1x1", ec: "M", packet: 540, fps: 12 },  // 頑丈側の基準
      { grid: "1x2", ec: "M", packet: 300, fps: 12 },  // 現距離ベスト (36s)
      { grid: "2x2", ec: "M", packet: 180, fps: 10 },  // 近距離で本領を出すか
      { grid: "2x2", ec: "M", packet: 300, fps: 10 },  // 近距離なら大packetも読めるか
    ];
    const SWEEP_TIMEOUT_MS = 90000;             // 1プロファイルの上限 (90s。要件60s超は勝者になり得ないので十分+発熱抑制)
    const SWEEP_NOPROGRESS_MS = 20000;          // この時間 unique=0 のままなら見切って次へ (密すぎ判定)
    let lastPayloadLen = 0;

    function buildSweepPatterns() {
      return SWEEP_PROFILES.map(p => ({ ...p, label: `${p.grid} ${p.ec}${p.packet} @${p.fps}` }));
    }

    async function postSweepState(runId, label, idx, total, running) {
      const { rows, cols } = gridDims();
      const body = {
        grid: $("grid").value, fps: parseInt($("fps").value), cells: rows * cols,
        oti: currentOtiHex, packetSize: currentPacketSize,
        totalPackets: encoder ? encoder.packetCount() : 0, running: !!running,
        sweep: true, runId, patternLabel: label, patternIndex: idx, patternTotal: total,
      };
      try { await fetch("/state/sender", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }); } catch (e) { /* オフライン可 */ }
    }
    async function postSweepEnd() {
      try { await fetch("/state/sender", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ grid: $("grid").value, running: false, sweep: false }) }); } catch (e) { /* noop */ }
    }

    async function runOnePattern(payload, pat, idx, total) {
      $("grid").value = pat.grid;
      $("fps").value = String(pat.fps);
      $("ecLevel").value = pat.ec;               // renderFrame が sweeping 中に参照する EC を切替
      const packetSize = pat.packet;
      currentPacketSize = packetSize;
      const extraRepair = Math.ceil(payload.length / packetSize * 0.5);
      encoder = new FountainEncoder(payload, packetSize, extraRepair);
      otiBytes = encoder.otiBytes();
      currentOtiHex = Array.from(otiBytes).map(b => b.toString(16).padStart(2, "0")).join("");
      const totalPackets = encoder.packetCount();
      const neededApprox = Math.ceil(payload.length / packetSize);
      packetCursor = 0; frameCount = 0;
      sweepRunId++;
      const myRun = sweepRunId;
      const label = pat.label;

      if (timer) clearInterval(timer);
      timer = setInterval(renderFrame, 1000 / pat.fps);
      postSweepState(myRun, label, idx, total, true);
      setStatus(`[スイープ ${idx + 1}/${total}] ${label} 開始 (受信側の追従待ち...)`);

      const startWall = performance.now();
      const deadline = startWall + SWEEP_TIMEOUT_MS;
      let recovered = null, lastRecv = null, gaveUp = false;
      while (performance.now() < deadline && sweeping) {
        postSweepState(myRun, label, idx, total, true);   // state を新鮮に保つハートビート
        const recv = await sampleReceiver();
        if (recv) lastRecv = recv;
        if (recv && recv.recoveredRunId === myRun) { recovered = recv; break; }
        const uniq = (lastRecv && lastRecv.uniquePackets) || 0;
        // 一定時間 1枚も読めない = この環境には密すぎる。見切って次プロファイルへ (時間節約)
        if (uniq === 0 && performance.now() - startWall > SWEEP_NOPROGRESS_MS) {
          gaveUp = true;
          setStatus(`[スイープ ${idx + 1}/${total}] ${label} 見切り (${SWEEP_NOPROGRESS_MS / 1000}s 読取0=密すぎ)`);
          break;
        }
        const remain = Math.round((deadline - performance.now()) / 1000);
        setStatus(`[スイープ ${idx + 1}/${total}] ${label} 計測中... 残り${remain}s / unique ${uniq}/${neededApprox}`);
        await sleep(700);
      }
      const wallSec = +((performance.now() - startWall) / 1000).toFixed(1);

      if (recovered) {
        const transferSec = recovered.recoverSec != null ? recovered.recoverSec : null;
        return {
          idx, label, grid: pat.grid, ec: pat.ec, fps: pat.fps, packetSize, totalPackets, neededApprox,
          ok: true, timeout: false, gaveUp: false, wallSec, transferSec,
          kbps: transferSec ? +((payload.length / 1024) / transferSec).toFixed(2) : null,
          scanFps: recovered.scanFps != null ? recovered.scanFps : null,
          readsPerFrame: recovered.readsPerFrame != null ? recovered.readsPerFrame : null,
          unique: recovered.uniquePackets != null ? recovered.uniquePackets : neededApprox,
        };
      }
      return {
        idx, label, grid: pat.grid, ec: pat.ec, fps: pat.fps, packetSize, totalPackets, neededApprox,
        ok: false, timeout: sweeping && !gaveUp, gaveUp, wallSec, transferSec: null, kbps: null,
        scanFps: lastRecv && lastRecv.scanFps != null ? lastRecv.scanFps : null,
        readsPerFrame: lastRecv && lastRecv.readsPerFrame != null ? lastRecv.readsPerFrame : null,
        unique: (lastRecv && lastRecv.uniquePackets) || 0,
      };
    }

    async function runDataSweep() {
      if (sweeping || probing) return;
      await init();
      const payload = await getPayload();
      if (payload.length === 0) { setStatus("ペイロードが空です (画像/テキストを入れてください)"); return; }
      lastPayloadLen = payload.length;
      sweeping = true;
      sweepRunId = 0;
      if (timer) { clearInterval(timer); timer = null; }
      if (statePollTimer) { clearInterval(statePollTimer); statePollTimer = null; }   // 通常ポーリングは止める
      $("startBtn").disabled = true;
      $("probeBtn").disabled = true;
      $("stopBtn").disabled = false;   // スイープ中は中断ボタンとして使う
      $("sweepBtn").disabled = true;
      $("sweepPanel").style.display = "block";
      $("feedback").className = "muted";
      $("feedback").textContent = "実データスイープ中 — スマホ receiver のカメラを画面に向けたままにしてください";
      const patterns = buildSweepPatterns();
      const results = [];
      try {
        for (let i = 0; i < patterns.length && sweeping; i++) {
          const res = await runOnePattern(payload, patterns[i], i, patterns.length);
          results.push(res);
          showSweepResults(results, false);
          await postSweepLog(results, false);
        }
      } catch (e) {
        setStatus(`スイープ異常終了: ${e.message || e}`);
      } finally {
        showSweepResults(results, true);
        await postSweepLog(results, true);
        if (timer) { clearInterval(timer); timer = null; }
        sweeping = false;
        await postSweepEnd();
        ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        $("startBtn").disabled = false;
        $("probeBtn").disabled = false;
        $("stopBtn").disabled = true;
        $("sweepBtn").disabled = false;
        setStatus(`スイープ完了: ${results.filter(r => r.ok).length}/${results.length} 成功`);
      }
    }

    function showSweepResults(results, done) {
      const ok = results.filter(r => r.ok);
      const best = ok.length ? [...ok].sort((a, b) => (b.kbps || 0) - (a.kbps || 0))[0] : null;
      const sorted = [...results].sort((a, b) => {
        if (a.ok !== b.ok) return a.ok ? -1 : 1;
        return (b.kbps || 0) - (a.kbps || 0);
      });
      let html = `<div class="sweep-head"><b>実データスイープ</b> ${done ? "(完了)" : `(${results.length}件)`}`;
      if (best) html += ` — 最速 <b>${best.label}</b> ${best.transferSec}s / ${best.kbps}KB/s`;
      html += `<button id="sweepCloseInner" class="probe-close" title="閉じる" style="float:right">×</button></div>`;
      html += `<table><tr><th>#</th><th>設定</th><th>結果</th><th>転送s</th><th>KB/s</th><th>scanFps</th><th>QR/f</th><th>unique</th></tr>`;
      for (const r of sorted) {
        const cls = best && r === best ? "best" : (r.ok ? "" : "fail");
        html += `<tr class="${cls}"><td>${r.idx + 1}</td><td>${r.label}</td>` +
          `<td>${r.ok ? "OK" : "NG"}</td>` +
          `<td>${r.transferSec != null ? r.transferSec : "—"}</td><td>${r.kbps != null ? r.kbps : "—"}</td>` +
          `<td>${r.scanFps != null ? r.scanFps : "—"}</td><td>${r.readsPerFrame != null ? r.readsPerFrame : "—"}</td>` +
          `<td>${r.unique}/${r.neededApprox}</td></tr>`;
      }
      html += `</table>`;
      $("sweepPanel").innerHTML = html;
    }

    async function postSweepLog(results, done) {
      const rows = results.map(r =>
        `${r.idx + 1}\t${r.label}\tpkt=${r.packetSize}\ttotalPkts=${r.totalPackets}\t` +
        (r.ok
          ? `OK\ttransfer=${r.transferSec}s\twall=${r.wallSec}s\t${r.kbps}KB/s\tscanFps=${r.scanFps}\tQR/frame=${r.readsPerFrame}\tunique=${r.unique}/${r.neededApprox}`
          : `NG(${r.gaveUp ? "見切り-密すぎ" : r.timeout ? "timeout" : "abort"})\twall=${r.wallSec}s\tunique=${r.unique}/${r.neededApprox}\tscanFps=${r.scanFps}\tQR/frame=${r.readsPerFrame}`)
      );
      const env = ($("envLabel").value || "").trim();
      const head = `=== beyond-qr プロファイルスイープ ${done ? "(完了)" : "(進行中)"} ===\n` +
        (env ? `環境: ${env}\n` : "") +
        `payload=${lastPayloadLen}B  profiles=${results.length}  timeout=${SWEEP_TIMEOUT_MS / 1000}s  noprogress=${SWEEP_NOPROGRESS_MS / 1000}s\n`;
      try { await fetch("/log", { method: "POST", headers: { "Content-Type": "text/plain" }, body: head + rows.join("\n") + "\n" }); } catch (e) { /* noop */ }
    }

    $("sweepBtn").addEventListener("click", () => runDataSweep().catch(e => setStatus(`sweep error: ${e.message}`)));
    $("sweepPanel").addEventListener("click", (e) => {
      if (e.target.closest("#sweepCloseInner")) $("sweepPanel").style.display = "none";
    });
  </script>
</body>
</html>
